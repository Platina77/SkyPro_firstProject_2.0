<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="top container">
        <header class="header top__header">
            <a href="#" class="logo header__logo">
                <img src="./img/logo-white.svg" alt="logo">
            </a>
            <form action="#" class="search header__search">
                <input type="text" class="search__input" placeholder="Поиск">
            </form>
            <nav class="nav header__nav">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="./catalog.html" class="nav__link">Каталог</a>
                    </li>
                    <li class="nav__item">
                        <a href="./cart.html" class="nav__link">Корзина</a>
                    </li>
                </ul>
            </nav>
        </header>
        <div class="top__inner">
            <h1 class="top__title">Всё, чего заслуживает ваш дом</h1>
            <p class="top__subtitle">Наша мебель — ваше отражение</p>
            <a href="./catalog.html" class="top__link">Перейти в каталог</a>
        </div>
    </section>

    <main>
        <section class="for container">
            <h2 class="section-title">Мебель для ... </h2>
            <div class="for__content">
                <div class="for__item for__item_rest for__item_big">отдыха</div>
                <div class="for__item for__item_work for__item_big">работы</div>
                <div class="for__item for__item_kitchen">кухни</div>
                <div class="for__item for__item_children">детской</div>
                <div class="for__item for__item_bathroom">ванной</div>
            </div>
        </section>
    </main>
</body>
</html>
